<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <title>Flask Website</title>
    </head>
    <body>
        <h1>Testing Successful</h1>
        <ul>
            {% for flower, details in flowers.items() %}
            <li>{{ flower }} - ${{ details['price'] }} (Stock: {{ details['stock'] }})</li>
            {% endfor %}
        </ul>
        <ul>
            {% for addon, details in addons.items() %}
            <li>{{ addon }} - ${{ details['price'] }}</li>
            {% endfor %}
        </ul>
    </body>
</html>
