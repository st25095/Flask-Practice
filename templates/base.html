<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width">
        <title>{% block title %}Flower Shop{% endblock %}</title>
    </head>
    <body>
        <header>
            <h1>Online Flower Shop</h1>
            <nav>
                <a href="{{ url_for('index')}}">Index </a>
                <a href="{{ url_for('index1')}}">Index 1</a>
                <a href="{{ url_for('about')}}">About</a>

            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
        <footer>
            <p>&copy; 2026 Flower Shop</p>
        </footer>
    </body>

</html>
